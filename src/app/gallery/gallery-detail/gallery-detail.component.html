<div class="card" *ngIf="colorPalette.length" [ngStyle]="{'background-color': colorPalette[0] | colorToHEX}">
  <div class="card-overlay" [ngStyle]="{'background-image': 'url('+galleryItem.imageUrl+')'}"></div>
  <div class="row">
    <div class="col-xs-12">
      <h3 class="category text-primary" [ngStyle]="{'color': colorPalette[1] | colorToHEX}">{{galleryItem.title}}</h3>
    </div>
    <div class="col-xs-12 col-md-6">
      <div class="card-image">
        <img class="img" src={{galleryItem.imageUrl}}/>
      </div>
    </div>
    <div class="col-xs-12 col-md-6">
      <div class="content">
        <p class="card-description text-dark-secondary" [ngStyle]="{'color': colorPalette[2] | colorToHEX}">
          {{galleryItem.description}}</p>
        <p>{{galleryItem.createdAt|date}}</p>

        <a
          [routerLink]="[galleryItem.id]"
          routerLinkActive="active"
        >Details</a>
      </div>
    </div>
  </div>
</div>
