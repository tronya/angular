<div *ngIf="loading">
  <app-loading-spinner></app-loading-spinner>
</div>
<div class="movies">
  <div class="container-fluid">

    <div *ngIf="previousActiveItem" [ngClass]="{'backDrops-cover':true,'animationActivated':animationActivated}">
      <img src="{{previousActiveItem.getBackDrops}}" alt="" class="image"/>
    </div>

    <div class="cover" *ngIf="activeItem"
         [ngStyle]=activeItemParameters>
      <img src="{{activeItem.getBackDrops}}" alt="" class="image"/>
    </div>

    <div class="main-content">
      <div class="row">
        <div class="col-xs-12 col-md-5">
          <div class="content" *ngIf="activeItem">
            <div class="overflow">
              <p class="title" [@appearingText]>{{activeItem.title}}</p>
            </div>
            <div class="overflow">
              <p class="description" [@appearingTextDelay]>{{activeItem.overview}}</p>
            </div>
          </div>
        </div>
        <div class="col-xs-12 col-md-7">
          <div class="slider-wrapper">
            <div class="slider">
              <div *ngFor="let movie of movies; let i = index;"
                   class="slide"
                   [ngStyle]="{
                  transform : 'translate('+15 * i+'rem, 0)',
                  transitionDelay: .2*i+'s'
                 }"
                   (click)="activeElementClick(movie,$event)"
              >
                <img
                  src="{{movie.getBackDrops}}"
                  alt=""
                  #movieChild
                  class="image">
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
