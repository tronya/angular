module.exports = " <div class=\"card card-blog fill-light\">\n    <div class=\"card-image\">\n      <img class=\"img\" src={{galleryItem.imageUrl}}/>\n    </div>\n    <div class=\"content\">\n      <p>{{galleryItem.createdAt}}</p>\n      <p class=\"category text-primary\">{{galleryItem.title}}</p>\n      <p class=\"card-description text-dark-secondary\">{{galleryItem.description}}</p>\n    </div>\n  </div>\n"
