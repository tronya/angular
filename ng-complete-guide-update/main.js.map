module.exports = "<div class=\"row\">\n  <form [formGroup]=\"galleryAddForm\" (ngSubmit)=\"onSubmit()\">\n\n    <div class=\"form-group\">\n      <label for=\"imagePath\">Enter your image link </label>\n      <input\n        type=\"text\"\n        id=\"imagePath\"\n        formControlName=\"imagePath\"\n        class=\"form-control\">\n    </div>\n    <div class=\"form-group\">\n      <label for=\"title\">Title</label>\n      <input\n        type=\"text\"\n        class=\"form-control\"\n        id=\"title\"\n        placeholder=\"Title\"\n        formControlName=\"title\"\n      >\n    </div>\n    <div class=\"form-group\">\n      <label for=\"description\">Description</label>\n      <input type=\"text\"\n             class=\"form-control\"\n             id=\"description\"\n             placeholder=\"Description\"\n             formControlName=\"description\"\n      >\n    </div>\n\n    <button type=\"submit\"\n            class=\"btn btn-success\"\n            [disabled]=\"!galleryAddForm.valid\">Send\n    </button>\n\n  </form>\n</div>\n"
